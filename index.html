<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ガラポン抽選機</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@700;800&display=swap');

    body {
      touch-action: none;
      /* スワイプによる画面スクロールを防止 */
      font-family: 'Shippori Mincho', serif;
      background-color: #fdfaf6;
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' fill='%23fdfaf6'/%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
    }

    .hit-area:hover {
      cursor: grab;
    }

    .hit-area:active {
      cursor: grabbing;
    }

    .japanese-border {
      border: 8px solid #b71c1c;
      box-shadow: 0 0 0 4px #ffca28, 0 10px 25px rgba(0, 0, 0, 0.2);
    }

    /* 予約セクション用スタイル */
    .reservation-section {
      display: none;
      position: fixed;
      inset: 0;
      background: #fdfaf6;
      z-index: 100;
      overflow-y: auto;
      padding: 2rem 1rem;
    }
    .reservation-card {
      background: #fffdfa;
      border: 8px solid #b71c1c;
      box-shadow: 0 0 0 4px #ffca28, 0 10px 25px rgba(0, 0, 0, 0.2);
      border-radius: 1rem;
      padding: 2rem;
      width: 100%;
      max-width: 28rem;
      margin: 0 auto;
      position: relative;
    }
    .text-shadow {
      text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 2px 2px 0 #ffca28;
    }
  </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen overflow-hidden text-gray-800">

  <div class="text-center mb-6 z-10">
    <h1 class="text-5xl md:text-6xl font-extrabold text-[#b71c1c] mb-3 tracking-widest text-shadow">
      だるまや大抽選会</h1>
    <p
      class="text-lg md:text-xl font-bold bg-[#fdfaf6] inline-block px-4 py-1 rounded-full border-2 border-[#b71c1c] text-[#b71c1c]">
      ハンドルを回して運試し！</p>
  </div>

  <div
    class="relative w-full max-w-3xl aspect-[4/3] md:aspect-video bg-[#fffdfa] rounded-xl japanese-border select-none overflow-hidden mt-2">
    <!-- SVG ガラポン -->
    <svg viewBox="0 0 800 600" class="w-full h-full" preserveAspectRatio="xMidYMid meet">
      <defs>
        <!-- ドラムのグラデーション -->
        <radialGradient id="drumGrad" cx="35%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#FF5252" />
          <stop offset="100%" stop-color="#B71C1C" />
        </radialGradient>

        <!-- 玉のグラデーション -->
        <radialGradient id="ballGrad-white" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#FFFFFF" />
          <stop offset="100%" stop-color="#E0E0E0" />
        </radialGradient>
        <radialGradient id="ballGrad-red" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#EF5350" />
          <stop offset="100%" stop-color="#C62828" />
        </radialGradient>
      </defs>

      <!-- 土台 -->
      <rect x="150" y="480" width="500" height="40" rx="10" fill="#795548" />
      <rect x="150" y="520" width="500" height="10" rx="5" fill="#4E342E" />

      <!-- 樋 (玉が転がる傾斜) -->
      <polygon points="450,420 450,450 200,480 200,450" fill="#90A4AE" />
      <polygon points="450,440 450,455 200,485 200,470" fill="#78909C" />

      <!-- 受け皿 -->
      <rect x="180" y="450" width="100" height="40" rx="10" fill="#CFD8DC" />
      <rect x="190" y="460" width="80" height="20" rx="5" fill="#B0BEC5" />

      <!-- 奥のスタンド -->
      <path d="M 430,280 L 370,480 L 410,480 L 450,280 Z" fill="#5D4037" />
      <path d="M 470,280 L 530,480 L 490,480 L 450,280 Z" fill="#5D4037" />

      <!-- ================= 回転するドラム ================= -->
      <g id="drum-group" transform="translate(450,280)">
        <!-- 八角形ボディ -->
        <polygon
          points="166.3,68.9 68.9,166.3 -68.9,166.3 -166.3,68.9 -166.3,-68.9 -68.9,-166.3 68.9,-166.3 166.3,-68.9"
          fill="url(#drumGrad)" stroke="#FFCA28" stroke-width="12" stroke-linejoin="round" />

        <!-- 金色の補強線 -->
        <line x1="0" y1="0" x2="166.3" y2="68.9" stroke="#FFCA28" stroke-width="6" stroke-linecap="round" />
        <line x1="0" y1="0" x2="68.9" y2="166.3" stroke="#FFCA28" stroke-width="6" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-68.9" y2="166.3" stroke="#FFCA28" stroke-width="6" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-166.3" y2="68.9" stroke="#FFCA28" stroke-width="6" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-166.3" y2="-68.9" stroke="#FFCA28" stroke-width="6" stroke-linecap="round" />
        <line x1="0" y1="0" x2="-68.9" y2="-166.3" stroke="#FFCA28" stroke-width="6" stroke-linecap="round" />
        <line x1="0" y1="0" x2="68.9" y2="-166.3" stroke="#FFCA28" stroke-width="6" stroke-linecap="round" />
        <line x1="0" y1="0" x2="166.3" y2="-68.9" stroke="#FFCA28" stroke-width="6" stroke-linecap="round" />

        <!-- 玉の出口穴 -->
        <circle cx="-130" cy="54" r="16" fill="#212121" />
        <circle cx="-130" cy="54" r="16" fill="none" stroke="#FFCA28" stroke-width="4" />
      </g>

      <!-- 手前のスタンド -->
      <path d="M 420,280 L 340,490 L 390,490 L 450,280 Z" fill="#8D6E63" />
      <path d="M 480,280 L 560,490 L 510,490 L 450,280 Z" fill="#8D6E63" />
      <polygon points="380,410 520,410 510,440 390,440" fill="#6D4C41" />

      <!-- 出てきた玉を描画するグループ -->
      <g id="ball-container"></g>

      <!-- 軸受け -->
      <circle cx="450" cy="280" r="30" fill="#CFD8DC" stroke="#90A4AE" stroke-width="4" />
      <circle cx="450" cy="280" r="15" fill="#78909C" />

      <!-- ================= 回転するハンドル ================= -->
      <g id="handle-group" transform="translate(450,280)">
        <!-- アーム -->
        <rect x="-10" y="-10" width="130" height="20" rx="10" fill="#ECEFF1" stroke="#B0BEC5" stroke-width="3" />
        <!-- 持ち手（木製） -->
        <rect x="100" y="-20" width="30" height="40" rx="15" fill="#5D4037" stroke="#3E2723" stroke-width="2" />
        <!-- 中心のピン -->
        <circle cx="0" cy="0" r="8" fill="#546E7A" />
      </g>

      <!-- インタラクション用の透明なヒットエリア（ドラッグ判定用） -->
      <circle cx="450" cy="280" r="220" fill="transparent" id="hit-area" class="hit-area" />
    </svg>
  </div>

  <button id="spin-btn" class="mt-8 relative group z-10">
    <div
      class="absolute inset-0 bg-[#ffca28] rounded-lg translate-y-2 group-hover:translate-y-1 group-active:translate-y-0 transition-transform">
    </div>
    <div
      class="relative bg-[#b71c1c] text-white px-10 py-4 text-2xl md:text-3xl rounded-lg font-bold border-2 border-[#ffca28] tracking-widest flex items-center justify-center group-hover:-translate-y-1 group-active:translate-y-0 transition-transform">
      <span style="text-shadow: 1px 1px 2px rgba(0,0,0,0.5);">自動で回す</span>
    </div>
  </button>

  <!-- 結果表示ポップアップ -->
  <div id="result-popup"
    class="fixed inset-0 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-all duration-500 scale-50 z-[50] bg-black/60 backdrop-blur-sm p-4">
    <div
      class="bg-[#fffdfa] p-4 md:p-8 rounded-lg shadow-2xl flex flex-col items-center justify-center japanese-border max-w-[95%] md:max-w-md relative overflow-y-auto overflow-x-hidden max-h-[90vh]">
      <div class="absolute inset-0 opacity-[0.03] pointer-events-none"
        style="background-image: radial-gradient(#b71c1c 2px, transparent 2px); background-size: 20px 20px;"></div>
      <h2 id="result-text" class="text-4xl md:text-6xl font-extrabold mb-4 tracking-widest z-10 flex-shrink-0 text-shadow">
        当たり！</h2>
      <div
        class="z-10 flex-shrink-0 bg-gray-200 border-4 border-[#e0e0e0] rounded-sm overflow-hidden shadow-inner flex items-center justify-center"
        style="width: 200px; height: 200px; min-height: 200px; min-width: 200px;">
        <img id="result-image" src="" alt="景品画像" style="width: 200px; height: 200px; object-fit: cover; display: none;">
        <div id="result-no-image" class="text-gray-400 font-bold" style="display: none;">画像なし</div>
      </div>
      <div class="mt-4 bg-[#b71c1c] text-white px-4 py-2 rounded-sm shadow-md z-10 border border-[#ffca28] flex-shrink-0">
        <p id="result-prize-name" class="text-xl md:text-2xl font-bold text-center tracking-wide">...</p>
      </div>
      <div class="mt-8 flex flex-col items-center gap-4 w-full z-10">
        <button id="reserve-popup-btn"
          class="hidden w-full px-8 py-4 bg-[#b71c1c] text-white font-black rounded-full shadow-lg border-2 border-[#ffca28] hover:translate-y-1 hover:shadow-md active:bg-[#8e1515] transition-all tracking-widest text-xl text-center">
          この特典で来店予約する ➡
        </button>
        <button id="close-popup-btn"
          class="px-6 py-2 bg-gray-100 text-gray-600 font-bold rounded-full shadow border-b-2 border-gray-300 hover:translate-y-0.5 active:bg-gray-200 transition-all text-sm">
          閉じる
        </button>
      </div>
    </div>
  </div>

  <!-- 【統合】予約フォームセクション -->
  <div id="reservation-section" class="reservation-section flex-col items-center justify-start">
    <div class="reservation-card">
      <div class="absolute inset-0 opacity-[0.03] pointer-events-none"
        style="background-image: radial-gradient(#b71c1c 2px, transparent 2px); background-size: 20px 20px;"></div>
      
      <div class="text-center mb-6 relative z-10">
        <h2 class="text-3xl font-extrabold text-[#b71c1c] mb-1 tracking-widest text-shadow">ご来店予約</h2>
        <p class="text-xs font-bold text-[#b71c1c]">特典をご利用になるための予約を承ります</p>
      </div>

      <div id="prize-verify-area" class="mb-6 bg-[#b71c1c]/10 border border-[#b71c1c]/30 p-4 rounded-sm relative z-10">
        <p class="text-xs font-bold text-[#b71c1c] mb-1">🎁 獲得された特典</p>
        <div id="res-prize-display" class="text-lg font-black text-[#b71c1c] tracking-wide">...</div>
      </div>

      <form id="reservation-form" action="https://formspree.io/f/xdapolan" method="POST" class="space-y-4 relative z-10">
        <input type="hidden" id="hidden-prize" name="prize" value="">
        <div>
          <label class="block text-sm font-bold text-[#b71c1c] mb-1">● お名前</label>
          <input type="text" name="name" required placeholder="だるま 太郎"
            class="w-full px-3 py-2 border-2 border-gray-300 rounded-sm focus:outline-none focus:border-[#b71c1c] font-sans">
        </div>
        <div>
          <label class="block text-sm font-bold text-[#b71c1c] mb-1">● ご連絡先</label>
          <input type="text" name="contact" required placeholder="090-1234-5678"
            class="w-full px-3 py-2 border-2 border-gray-300 rounded-sm focus:outline-none focus:border-[#b71c1c] font-sans">
        </div>
        <div>
          <label class="block text-sm font-bold text-[#b71c1c] mb-1">● ご来店希望日時</label>
          <input type="datetime-local" name="datetime" required
            class="w-full px-3 py-2 border-2 border-gray-300 rounded-sm focus:outline-none focus:border-[#b71c1c] font-sans">
        </div>
        <div class="pt-4">
          <button type="submit" id="res-submit-btn"
            class="w-full bg-[#ffca28] text-[#b71c1c] font-black py-3 rounded-full shadow-lg border-b-4 border-[#ffb300] hover:translate-y-1 hover:border-b-0 active:bg-yellow-400 transition-all tracking-widest text-xl disabled:opacity-50">
            予約を確定する
          </button>
        </div>
        <!-- エラー時の予備ボタン -->
        <div id="fallback-area" class="hidden mt-4 p-4 bg-red-50 border border-red-200 rounded-lg text-center">
          <p class="text-xs text-red-600 mb-2 font-bold">⚠️ 通信が制限されました。赤いボタンから再送信してください。</p>
          <button type="button" id="fallback-btn" class="text-sm bg-red-600 text-white font-bold py-2 px-4 rounded-md">
            標準モードで再送信
          </button>
        </div>
      </form>

      <!-- 完了メッセージ -->
      <div id="success-msg" class="hidden flex-col items-center justify-center p-6 text-center relative z-10">
        <div class="text-5xl mb-4">🙏</div>
        <h2 class="text-2xl font-extrabold text-[#b71c1c] mb-2 text-shadow">ご予約を承りました</h2>
        <p class="text-sm text-gray-600">確認のお電話をさせていただきます。ご来店を心よりお待ちしております。</p>
        <button id="back-to-lotto-btn" class="mt-8 px-8 py-2 bg-[#b71c1c] text-white rounded-full text-sm font-bold">
          抽選画面に戻る
        </button>
      </div>
      
      <button id="close-res-btn" class="mt-4 w-full text-xs text-gray-400 underline h-8">予約せずに戻る</button>
    </div>
  </div>

  <script>
    // --- 音声関連のセットアップ ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) audioCtx = new AudioContext();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playClickSound() {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'square';
      osc.frequency.setValueAtTime(500, audioCtx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.03);
      const filter = audioCtx.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 1500;
      gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
      osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    function playTaiko(time, isStrong = false) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(130, time);
      osc.frequency.exponentialRampToValueAtTime(40, time + 0.4);
      gain.gain.setValueAtTime(isStrong ? 1.5 : 1.0, time);
      gain.gain.exponentialRampToValueAtTime(0.01, time + 0.4);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(time); osc.stop(time + 0.5);
      const snap = audioCtx.createOscillator();
      const snapGain = audioCtx.createGain();
      snap.type = 'triangle';
      snap.frequency.setValueAtTime(400, time);
      snap.frequency.exponentialRampToValueAtTime(100, time + 0.05);
      snapGain.gain.setValueAtTime(isStrong ? 0.6 : 0.3, time);
      snapGain.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
      snap.connect(snapGain); snapGain.connect(audioCtx.destination);
      snap.start(time); snap.stop(time + 0.1);
    }

    function playKane(time) {
      if (!audioCtx) return;
      [800, 1200, 1800].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq + (Math.random() * 20 - 10), time);
        gain.gain.setValueAtTime(0.15 / (i + 1), time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 1.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(time); osc.stop(time + 1.2);
      });
    }

    function playJapaneseResultSound(rank) {
      if (!audioCtx) return;
      const now = audioCtx.currentTime;
      if (rank === 0) {
        playTaiko(now); playTaiko(now + 0.2); playTaiko(now + 0.4, true);
        playKane(now + 0.4); playKane(now + 0.8);
      } else {
        playTaiko(now);
      }
    }

    // --- 抽選ロジック ---
    const balls = [
      { fill: 'url(#ballGrad-white)', stroke: '#BDBDBD', prob: 0.80, text: '残念…', textColor: '#999999', rank: 1, prizeName: 'またのお越しをお待ちしております', image: 'images/lose.jpg' },
      { fill: 'url(#ballGrad-red)', stroke: '#D32F2F', prob: 0.20, text: '🎊 大当たり！', textColor: '#D32F2F', rank: 0, prizeName: '1万円割引クーポン（3万円以上のお買い上げで使えます）', image: 'images/win.jpg' }
    ];

    function getRandomBall() {
      const rand = Math.random();
      let cumulative = 0;
      for (let b of balls) {
        cumulative += b.prob;
        if (rand <= cumulative) return b;
      }
      return balls[0];
    }

    // --- DOM要素 ---
    const hitArea = document.getElementById('hit-area');
    const drum = document.getElementById('drum-group');
    const handle = document.getElementById('handle-group');
    const ballContainer = document.getElementById('ball-container');
    const popup = document.getElementById('result-popup');
    const resultText = document.getElementById('result-text');
    const resultImage = document.getElementById('result-image');
    const resultNoImage = document.getElementById('result-no-image');
    const resultPrizeName = document.getElementById('result-prize-name');
    const reservePopupBtn = document.getElementById('reserve-popup-btn');

    // 予約関連
    const reservationSection = document.getElementById('reservation-section');
    const reservationForm = document.getElementById('reservation-form');
    const resPrizeDisplay = document.getElementById('res-prize-display');
    const hiddenPrize = document.getElementById('hidden-prize');
    const resSubmitBtn = document.getElementById('res-submit-btn');
    const successMsg = document.getElementById('success-msg');
    const prizeArea = document.getElementById('prize-verify-area');
    const fallbackArea = document.getElementById('fallback-area');
    const fallbackBtn = document.getElementById('fallback-btn');

    let isDragging = false, currentAngle = 0, startAngle = 0, lastClickAngle = 0;
    let isSpinLocked = false, lastSpinCount = -1;

    function getMouseAngle(e) {
      const rect = hitArea.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return Math.atan2(clientY - cy, clientX - cx);
    }

    function onStart(e) {
      if (isSpinLocked) return;
      e.preventDefault(); initAudio();
      isDragging = true;
      startAngle = getMouseAngle(e);
      lastSpinCount = Math.floor((currentAngle - 292.5) / 360);
    }

    function onMove(e) {
      if (!isDragging || isSpinLocked) return;
      e.preventDefault();
      const angle = getMouseAngle(e);
      let delta = angle - startAngle;
      if (delta > Math.PI) delta -= Math.PI * 2;
      if (delta < -Math.PI) delta += Math.PI * 2;
      currentAngle += delta * (180 / Math.PI);
      startAngle = angle;
      updateRotation();
    }

    function onEnd() { isDragging = false; }

    hitArea.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    hitArea.addEventListener('touchstart', onStart, { passive: false });
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onEnd);

    function updateRotation() {
      drum.setAttribute('transform', `translate(450,280) rotate(${currentAngle})`);
      handle.setAttribute('transform', `translate(450,280) rotate(${currentAngle})`);
      if (Math.abs(currentAngle - lastClickAngle) > 30) {
        playClickSound(); lastClickAngle = currentAngle;
      }
      let currentSpinCount = Math.floor((currentAngle - 292.5) / 360);
      if (currentSpinCount > lastSpinCount) {
        dropBall(); lastSpinCount = currentSpinCount;
      } else if (currentSpinCount < lastSpinCount) {
        lastSpinCount = currentSpinCount;
      }
    }

    function dropBall() {
      const ballData = getRandomBall();
      const ball = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ball.setAttribute('r', '12'); ball.setAttribute('fill', ballData.fill);
      ball.setAttribute('stroke', ballData.stroke); ball.setAttribute('stroke-width', '2');
      ballContainer.appendChild(ball);
      isSpinLocked = true; isDragging = false;
      document.getElementById('spin-btn').classList.add('opacity-50', 'pointer-events-none');
      const startX = 450, startY = 420, dropY = 438;
      const endX = 200 + Math.random() * 40, endY = 460 + (Math.random() - 0.5) * 8;
      let startTime = null; const duration = 1200;
      function animateBall(time) {
        if (!startTime) startTime = time;
        const progress = Math.min((time - startTime) / duration, 1);
        let x, y;
        if (progress < 0.2) {
          const p = progress / 0.2; x = startX; y = startY + (dropY - startY) * p;
        } else {
          const p = (progress - 0.2) / 0.8; const easeP = 1 - Math.pow(1 - p, 3);
          x = startX + (endX - startX) * easeP; y = dropY + (endY - dropY) * easeP;
        }
        ball.setAttribute('cx', x); ball.setAttribute('cy', y);
        if (progress < 1) requestAnimationFrame(animateBall);
        else setTimeout(() => {
          playJapaneseResultSound(ballData.rank); showResultToast(ballData);
        }, 1500);
      }
      requestAnimationFrame(animateBall);
    }

    function showResultToast(ballData) {
      resultText.textContent = ballData.text;
      resultText.style.color = ballData.textColor;
      const popupCard = popup.querySelector('.japanese-border');
      popupCard.style.borderColor = ballData.textColor;
      popupCard.style.boxShadow = `0 0 0 4px #ffca28, 0 10px 25px rgba(0,0,0,0.3)`;
      resultPrizeName.textContent = ballData.prizeName;
      resultPrizeName.parentElement.style.backgroundColor = ballData.textColor;

      if (ballData.image) {
        resultImage.onload = () => { resultImage.style.display = 'block'; resultNoImage.style.display = 'none'; };
        resultImage.onerror = () => { resultImage.style.display = 'none'; resultNoImage.style.display = 'block'; };
        resultNoImage.style.display = 'none'; resultImage.src = ballData.image;
      } else {
        resultImage.style.display = 'none'; resultNoImage.style.display = 'block';
      }

      if (ballData.rank === 0) {
        reservePopupBtn.classList.remove('hidden');
        reservePopupBtn.onclick = () => openReservation(ballData);
      } else {
        reservePopupBtn.classList.add('hidden');
      }

      popup.classList.remove('opacity-0', 'scale-50', 'pointer-events-none');
      popup.classList.add('opacity-100', 'scale-100');
      if (ballData.rank === 0) window.confettiInterval = startConfetti();
    }

    function startConfetti() {
      const duration = 15 * 1000, animationEnd = Date.now() + duration;
      const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };
      const randomInRange = (min, max) => Math.random() * (max - min) + min;
      return setInterval(() => {
        const timeLeft = animationEnd - Date.now();
        if (timeLeft <= 0) return clearInterval(window.confettiInterval);
        const particleCount = 50 * (timeLeft / duration);
        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } });
        confetti({ ...defaults, particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } });
      }, 250);
    }

    document.getElementById('close-popup-btn').addEventListener('click', closePopups);

    function closePopups() {
      popup.classList.remove('opacity-100', 'scale-100');
      popup.classList.add('opacity-0', 'scale-50', 'pointer-events-none');
      if (window.confettiInterval) { clearInterval(window.confettiInterval); window.confettiInterval = null; }
      isSpinLocked = false;
      const spinBtn = document.getElementById('spin-btn');
      spinBtn.classList.remove('opacity-50', 'pointer-events-none');
      spinBtn.classList.add('group');
      ballContainer.innerHTML = '';
      isAutoSpinning = false;
    }

    let isAutoSpinning = false;
    document.getElementById('spin-btn').addEventListener('click', () => {
      if (isAutoSpinning || isSpinLocked) return;
      initAudio(); isAutoSpinning = true; isSpinLocked = true;
      const spinBtn = document.getElementById('spin-btn');
      spinBtn.classList.add('opacity-50', 'pointer-events-none');
      const targetAngle = currentAngle + 360, startAngleAnim = currentAngle;
      let startTime = null; const duration = 1500;
      lastSpinCount = Math.floor((currentAngle - 292.5) / 360);
      function autoSpin(time) {
        if (!startTime) startTime = time;
        const progress = Math.min((time - startTime) / duration, 1);
        const easeP = progress < 0.5 ? 2 * progress * progress : -1 + (4 - 2 * progress) * progress;
        currentAngle = startAngleAnim + 360 * easeP;
        updateRotation();
        if (progress < 1) requestAnimationFrame(autoSpin); else isAutoSpinning = false;
      }
      requestAnimationFrame(autoSpin);
    });

    // --- 【新機能】予約システム統合ロジック ---
    function openReservation(ballData) {
      // ポップアップを閉じる（紙吹雪は継続させても良いが、一旦止める）
      if (window.confettiInterval) { clearInterval(window.confettiInterval); window.confettiInterval = null; }
      popup.classList.add('opacity-0', 'pointer-events-none');
      
      // 予約セクション表示
      resPrizeDisplay.textContent = ballData.prizeName;
      hiddenPrize.value = ballData.prizeName;
      reservationSection.style.display = 'flex';
      successMsg.classList.add('hidden');
      reservationForm.classList.remove('hidden');
      prizeArea.style.display = 'block';
      fallbackArea.classList.add('hidden');
      resSubmitBtn.disabled = false;
      resSubmitBtn.textContent = "予約を確定する";
      
      // スムーズに上部へ
      reservationSection.scrollTo({ top: 0, behavior: 'smooth' });
    }

    reservationForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      resSubmitBtn.disabled = true;
      resSubmitBtn.innerHTML = '<span>送信中...</span>';
      
      const formData = new FormData(reservationForm);
      try {
        const response = await fetch(reservationForm.action, {
          method: 'POST',
          body: formData,
          headers: { 'Accept': 'application/json' }
        });
        if (response.ok) {
          reservationForm.classList.add('hidden');
          prizeArea.style.display = 'none';
          successMsg.classList.remove('hidden');
          successMsg.classList.add('flex');
        } else {
          const data = await response.json();
          alert("【エラー】\n" + (data.errors ? data.errors.map(e => e.message).join(", ") : "送信に失敗しました。"));
          resSubmitBtn.disabled = false;
          resSubmitBtn.textContent = "予約を確定する";
        }
      } catch (error) {
        console.error('Submission error:', error);
        alert("【ネットワークエラー】\n通信が制限されました。赤い予備ボタンをお試しください。");
        resSubmitBtn.style.display = 'none';
        fallbackArea.classList.remove('hidden');
      }
    });

    fallbackBtn.addEventListener('click', () => { reservationForm.submit(); });
    
    document.getElementById('back-to-lotto-btn').addEventListener('click', () => {
      reservationSection.style.display = 'none';
      closePopups();
    });
    
    document.getElementById('close-res-btn').addEventListener('click', () => {
      reservationSection.style.display = 'none';
      closePopups();
    });
  </script>
</body>

</html>
